//  CONSTANTS

const GRAVITY        = 0.75;

// ═══════════════════════════════════════════════════════════════
//  AUDIO  (Web Audio chiptune — same as before)
// ═══════════════════════════════════════════════════════════════
let AC = null, masterGain = null, musicMuted = false, nextLoopAt = 0;
const BPM_M = 130, Bq = 60/BPM_M, Be = Bq/2, LOOP_DUR = 16*Bq;
const C3=130.81,F3=174.61,G3=196.00,A3=220.00;
const C5=523.25,D5=587.33,E5=659.25,F5=698.46,G5=783.99,A5=880.00,C6=1046.50;
const MEL=[
  [G5,Be],[E5,Be],[C5,Be],[E5,Be],[G5,Be],[A5,Be],[C6,Be],[A5,Be],
  [G5,Be],[E5,Be],[D5,Be],[F5,Be],[E5,Be],[0,Be],[D5,Be],[0,Be],
  [C6,Be],[A5,Be],[G5,Be],[E5,Be],[F5,Be],[A5,Be],[G5,Be],[E5,Be],
  [D5,Be],[F5,Be],[E5,Be],[C5,Be],[G5,Be*2],[0,Be],[0,Be],
];
const BASS=[
  [C3,Bq],[G3,Bq],[C3,Bq],[G3,Bq],[A3,Bq],[F3,Bq],[G3,Bq],[C3,Bq],
  [C3,Bq],[G3,Bq],[C3,Bq],[G3,Bq],[F3,Bq],[A3,Bq],[G3,Bq],[C3,Bq],
];
function audioNote(f,d,t,type,vol){if(!AC||!masterGain||f===0)return;const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(masterGain);const a=0.004,r=Math.min(0.06,d*0.18);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+a);g.gain.setValueAtTime(vol,t+d-r);g.gain.linearRampToValueAtTime(0,t+d);o.start(t);o.stop(t+d+0.01);}
function audioKick(t){if(!AC||!masterGain)return;const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(masterGain);o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(0.01,t+0.26);g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.26);o.start(t);o.stop(t+0.27);}
function audioNoise(t,len,hpfHz,vol){if(!AC||!masterGain)return;const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*len),AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=AC.createBufferSource();src.buffer=buf;const hpf=AC.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=hpfHz;const g=AC.createGain();g.gain.value=vol;src.connect(hpf);hpf.connect(g);g.connect(masterGain);src.start(t);src.stop(t+len);}
function scheduleLoop(startAt){if(!AC)return;let t=startAt;MEL.forEach(([f,d])=>{audioNote(f,d*0.82,t,'square',0.22);t+=d;});t=startAt;BASS.forEach(([f,d])=>{audioNote(f,d*0.65,t,'triangle',0.26);t+=d;});for(let b=0;b<16;b++){const bt=startAt+b*Bq;if(b%4===0||b%4===2)audioKick(bt);if(b%4===1||b%4===3)audioNoise(bt,0.09,2000,0.14);audioNoise(bt,0.03,9000,0.07);audioNoise(bt+Be,0.03,9000,0.05);}nextLoopAt=startAt+LOOP_DUR;setTimeout(()=>{if(AC)scheduleLoop(nextLoopAt);},Math.max(0,(nextLoopAt-AC.currentTime-0.15)*1000));}
function initAudio(){if(AC){if(AC.state==='suspended')AC.resume();return;}AC=new(window.AudioContext||window.webkitAudioContext)();masterGain=AC.createGain();masterGain.gain.value=musicMuted?0:0.22;masterGain.connect(AC.destination);scheduleLoop(AC.currentTime+0.05);}
function toggleMute(){musicMuted=!musicMuted;if(masterGain)masterGain.gain.value=musicMuted?0:0.22;}

  {name:'Purple Furball', rarity:'uncommon', w: 8,main:'#9B59B6',spike:'#6C3483',eye:'#FF69FF',pupil:'#3B0060',glow:null},
  {name:'Red Furball',    rarity:'rare',     w: 6,main:'#CC2222',spike:'#990000',eye:'#FF6666',pupil:'#220000',glow:'#FF2200'},

  {name:'Brown Bunny',   rarity:'common',   w:18,body:'#8B6940',ear:'#CC9966',eye:'#4a2800',nose:'#cc8866',glow:null},
  {name:'Gray Bunny',    rarity:'common',   w:17,body:'#AAAAAA',ear:'#CC8888',eye:'#666666',nose:'#CC9999',glow:null},
  {name:'Yellow Bunny',  rarity:'uncommon', w:12,body:'#FFE680',ear:'#FFCC00',eye:'#CC7700',nose:'#FFB000',glow:null},
  {name:'Blue Bunny',    rarity:'uncommon', w:10,body:'#88AAFF',ear:'#AACCFF',eye:'#224499',nose:'#6688CC',glow:null},
  {name:'Purple Bunny',  rarity:'uncommon', w: 8,body:'#CC88FF',ear:'#AA44FF',eye:'#6600CC',nose:'#AA55DD',glow:null},
  {name:'Spotted Bunny', rarity:'rare',     w: 6,body:'#F0F0F0',ear:'#FFB6C1',eye:'#333',   nose:'#FFB6C1',glow:null,spots:true},
  {name:'Rainbow Bunny', rarity:'rare',     w: 4,body:'#FFB6C1',ear:'#FF69B4',eye:'#8B00FF',nose:'#FF1493',glow:null,rainbow:true},
  {name:'Golden Bunny',  rarity:'legendary',w: 3,body:'#FFD700',ear:'#FFA500',eye:'#8B4513',nose:'#FF8C00',glow:'#FFD700'},
  {name:'Dark Bunny',    rarity:'legendary',w: 2,body:'#111',   ear:'#220022',eye:'#FF0000',nose:'#660000',glow:'#8B00FF',dark:true},

function weightedRandom(vs){const tot=vs.reduce((s,v)=>s+v.w,0);let r=Math.random()*tot;for(const v of vs){r-=v.w;if(r<=0)return v;}return vs[vs.length-1];}
const RARITY_COLOR={common:'#999',uncommon:'#55cc55',rare:'#4488FF',legendary:'#FFD700'};
const RARITY_LABEL={common:'★ Common',uncommon:'★★ Uncommon',rare:'★★★ Rare',legendary:'✦ LEGENDARY'};
function getAvatarName(i){if(i<13)return['Brown Unicorn','White Bunny','Black Fur Ball','Golden Unicorn','Chips','🍕 PIZZA???','Rainbow Unicorn','Lava Bunny','Water Bird','Snail','Butterfly','Donut','Cookie'][i];if(i<23)return UNICORN_VARIANTS[i-13].name;if(i<33)return FURBALL_VARIANTS[i-23].name;if(i<43)return BUNNY_VARIANTS[i-33].name;return'???';}
function getAvatarRarity(i){if(i<13)return null;if(i<23)return UNICORN_VARIANTS[i-13].rarity;if(i<33)return FURBALL_VARIANTS[i-23].rarity;if(i<43)return BUNNY_VARIANTS[i-33].rarity;return null;}

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
let state='start';
let score,level,missesInRow,speed,frame,scrollX;
let stars,particles,bgStars;
let unlockedAvatars,activeAvatar,newUnlock;
let spawnCooldown,spawnTimer,player;
let prevGameState='playing';
let settingsBtns={},settingsAvatarRects=[],settingsPrevBtn=null,settingsNextBtn=null,settingsPage=0;
let diamonds=0,ownedMysteryAvatars=new Set();
let storeResult=null,storeResultBtns={},storeBtns={};

function speedForLevel(l){if(l<=6)return 3.5+(l-1)*0.7;return 7.7+Math.pow(l-6,1.9)*1.4;}
function cooldownForLevel(l){return Math.max(22,110-(l-1)*9-Math.max(0,l-6)*12);}
function groundLevel(){return Math.floor(canvas.height*0.68);}

function initGame(){
  score=0;level=1;missesInRow=0;speed=speedForLevel(1);frame=0;scrollX=0;
  stars=[];particles=[];spawnTimer=0;spawnCooldown=cooldownForLevel(1);
  unlockedAvatars=[0];activeAvatar=0;newUnlock=null;
  settingsPage=0;storeResult=null;
  const W=canvas.width,gy=groundLevel();
  player={x:W*0.22,y:gy,vy:0,jumping:false,legFrame:0};
  bgStars=Array.from({length:60},(_,i)=>({x:(i*239+17)%W,y:(i*137+53)%(gy*0.85),r:(i%4===0)?2:1,phase:i*0.4}));
  // Preserve diamonds & ownedMysteryAvatars across restarts
}

// ═══════════════════════════════════════════════════════════════
//  ICON BUTTONS
// ═══════════════════════════════════════════════════════════════
const BTN_R=26;
function muteBtnXY()    {return{x:canvas.width-44,y:44};}
function settingsBtnXY(){return{x:canvas.width-44,y:96};}
function storeBtnXY()   {return{x:canvas.width-44,y:148};}
function drawIconBtn(x,y,r,icon,active){
  ctx.save();
  ctx.fillStyle=active?'rgba(139,0,255,0.55)':'rgba(0,0,0,0.52)';
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  if(active){ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();}
  ctx.font='20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,x,y);ctx.textBaseline='alphabetic';ctx.restore();
}
function drawMuteBtn()    {const p=muteBtnXY();   drawIconBtn(p.x,p.y,BTN_R,musicMuted?'🔇':'🎵',false);}
function drawSettingsBtn(){const p=settingsBtnXY();drawIconBtn(p.x,p.y,BTN_R,'⚙️',state==='settings');}
function drawStoreBtn()   {
  const p=storeBtnXY();
  drawIconBtn(p.x,p.y,BTN_R,'🏪',state==='store');
  if(diamonds>0){
    ctx.save();ctx.fillStyle='#88DDFF';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText('💎'+diamonds,p.x,p.y+BTN_R+12);ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
function tapPos(e){if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.clientX!==undefined)return{x:e.clientX,y:e.clientY};return null;}
function inCircle(px,py,cx,cy,r){return(px-cx)**2+(py-cy)**2<=r*r;}
function inRect(px,py,r){return r&&px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}

function handleTap(e){
  const pos=tapPos(e);
  if(pos){
    const mb=muteBtnXY();
    if(inCircle(pos.x,pos.y,mb.x,mb.y,BTN_R)){toggleMute();return;}
    if(state!=='start'){
      const sb=settingsBtnXY();
      if(inCircle(pos.x,pos.y,sb.x,sb.y,BTN_R)){
        if(state==='settings'){state=prevGameState;}
        else if(state!=='store'&&state!=='levelup'){prevGameState=state;state='settings';}
        return;
      }
      const stb=storeBtnXY();
      if(inCircle(pos.x,pos.y,stb.x,stb.y,BTN_R)){
        if(state==='store'){state=prevGameState;}
        else if(state!=='settings'&&state!=='levelup'){prevGameState=state;state='store';}
        return;
      }
    }
  }
  initAudio();

  // Store interactions
  if(state==='store'){
    if(!pos)return;
    if(storeResult){
      if(inRect(pos.x,pos.y,storeResultBtns.equip)){activeAvatar=storeResult.avatarIdx;storeResult=null;return;}
      if(inRect(pos.x,pos.y,storeResultBtns.ok)){storeResult=null;return;}
      return;
    }
    for(const btn of(storeBtns.buy||[])){
      if(inRect(pos.x,pos.y,btn)){
        if(diamonds>=5){diamonds-=5;openMysteryBox(btn.key);}
        return;
      }
    }
    if(inRect(pos.x,pos.y,storeBtns.close)){state=prevGameState;return;}
    return;
  }

  // Settings interactions
  if(state==='settings'){
    if(!pos)return;
    if(inRect(pos.x,pos.y,settingsPrevBtn)){settingsPage=Math.max(0,settingsPage-1);return;}
    if(inRect(pos.x,pos.y,settingsNextBtn)){settingsPage++;return;}
    for(const r of settingsAvatarRects){if(r&&inRect(pos.x,pos.y,r)){activeAvatar=r.avatarIdx;return;}}
    if(inRect(pos.x,pos.y,settingsBtns.resume)) {state=prevGameState==='gameover'?'gameover':'playing';return;}
    if(inRect(pos.x,pos.y,settingsBtns.restart)){initGame();state='playing';return;}
    if(inRect(pos.x,pos.y,settingsBtns.pause))  {state='paused';return;}
    return;
  }

  if(state==='paused'){state='playing';return;}
  if(state==='start')   {state='playing';return;}
  if(state==='gameover'){initGame();state='playing';return;}
  if(state==='levelup') {state='playing';return;}
  if(state==='playing'&&!player.jumping){player.vy=JUMP_VY;player.jumping=true;}
}
canvas.addEventListener('pointerdown',handleTap);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){initAudio();handleTap({});}
  if(e.code==='Escape'||e.code==='KeyP'){
    if(state==='settings'){state=prevGameState;}
    else if(state==='store'){state=prevGameState;}
    else if(state==='playing'){prevGameState='playing';state='paused';}
    else if(state==='paused'){state='playing';}
  }
});

function openMysteryBox(type){
  const vm={unicorn:UNICORN_VARIANTS,furball:FURBALL_VARIANTS,bunny:BUNNY_VARIANTS};
  const bi={unicorn:13,furball:23,bunny:33};
  const v=weightedRandom(vm[type]);
  const idx=bi[type]+vm[type].indexOf(v);
  const isNew=!ownedMysteryAvatars.has(idx);
  if(isNew){ownedMysteryAvatars.add(idx);}else{diamonds+=1;}
  storeResult={avatarIdx:idx,variant:v,isNew};
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function drawStar5(x,y,sz,color,glow){
  ctx.save();if(glow){ctx.shadowColor=color;ctx.shadowBlur=18;}ctx.fillStyle=color;
  ctx.beginPath();for(let i=0;i<10;i++){const a=(i*Math.PI)/5-Math.PI/2,r=(i%2===0)?sz:sz*0.42;i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.restore();
}
function burst(x,y){for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2,sp=3+Math.random()*6;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,r:4+Math.random()*5,color:['#FFD700','#FF69B4','#00FFDD','#FFA500','#fff'][i%5]});}}

// 0 – Brown Unicorn
function drawBrownUnicorn(cx,cy,lf){
  const sw=Math.sin(lf*0.28);
  ctx.save();ctx.translate(cx,cy);
  ['#FF69B4','#9B59B6','#3498DB'].forEach((c,i)=>{ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(-36+i*2,4+i*5+Math.sin(lf*0.18+i)*5,5,11,0.3+i*0.2,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#7B4A2A';ctx.beginPath();ctx.ellipse(0,0,33,20,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(22,-16,13,10,-0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(34,-22,16,12,-0.25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#9A6040';ctx.beginPath();ctx.ellipse(46,-18,7,5,0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5A3010';ctx.beginPath();ctx.arc(49,-17,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(38,-26,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(39,-27,1.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(30,-32);ctx.lineTo(36,-54);ctx.lineTo(40,-32);ctx.closePath();ctx.fill();
  ['#FF69B4','#9B59B6','#3498DB'].forEach((c,i)=>{ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(18-i*7,-28+i*3,7,5,0.5,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='#5C3418';ctx.lineWidth=8;ctx.lineCap='round';
  [[14,sw*0.8],[20,-sw*0.8],[-14,-sw*0.5],[-20,sw*0.5]].forEach(([bx,off])=>{ctx.beginPath();ctx.moveTo(bx,14);ctx.lineTo(bx+off*12,34);ctx.stroke();});
  ctx.restore();

function spawnStar(){
  const W=canvas.width,gy=groundLevel();
  stars.push({x:W+60,y:gy-65-Math.random()*105,size:17+Math.random()*9,phase:Math.random()*100,caught:false,missed:false});

function checkCatch(){
  const px=player.x,py=player.y;
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];if(s.caught||s.missed)continue;
    if(Math.hypot(px-s.x,py-s.y)<52){
      s.caught=true;score++;missesInRow=0;burst(s.x,s.y);stars.splice(i,1);
      const nl=1+Math.floor(score/20);
      if(nl>level){
        level=nl;diamonds++;speed=speedForLevel(level);spawnCooldown=cooldownForLevel(level);
        const ai=level-1;
        if(ai<13&&!unlockedAvatars.includes(ai)){unlockedAvatars.push(ai);activeAvatar=ai;newUnlock=ai;}
        else{newUnlock=null;}
        state='levelup';
      }
    }
  }
}

// ─── Settings ────────────────────────────────────────────────
function drawSettings(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='rgba(0,0,0,0.80)';ctx.fillRect(0,0,W,H);
  const pw=Math.min(480,W-32),ph=Math.min(560,H-40);
  const px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle='#120636';rrect(px,py,pw,ph,18);ctx.fill();
  ctx.strokeStyle='#7B2FBE';ctx.lineWidth=2;rrect(px,py,pw,ph,18);ctx.stroke();
  ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;ctx.font='bold 24px Arial';ctx.fillText('⚙  SETTINGS',W/2,py+44);ctx.shadowBlur=0;
  ctx.strokeStyle='#2e1260';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+20,py+58);ctx.lineTo(px+pw-20,py+58);ctx.stroke();
  ctx.fillStyle='#bbb';ctx.font='14px Arial';ctx.fillText('Choose Avatar',W/2,py+76);

  // Build owned avatar list
  const ownedList=[...unlockedAvatars,...Array.from(ownedMysteryAvatars)].sort((a,b)=>a-b);
  const PER_PAGE=8,COLS=4;
  const totalPages=Math.ceil(ownedList.length/PER_PAGE);
  settingsPage=Math.min(settingsPage,Math.max(0,totalPages-1));
  const pageItems=ownedList.slice(settingsPage*PER_PAGE,(settingsPage+1)*PER_PAGE);
  const cellW=Math.floor((pw-32)/COLS)-6,cellH=84;
  const gridW=COLS*cellW+(COLS-1)*6,gridX=W/2-gridW/2,gridY=py+88;
  settingsAvatarRects=[];
  pageItems.forEach((avatarIdx,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    const cx2=gridX+col*(cellW+6),cy2=gridY+row*(cellH+6);
    const sel=activeAvatar===avatarIdx;
    settingsAvatarRects.push({x:cx2,y:cy2,w:cellW,h:cellH,avatarIdx});
    ctx.fillStyle=sel?'rgba(139,0,255,0.35)':'rgba(255,255,255,0.04)';rrect(cx2,cy2,cellW,cellH,8);ctx.fill();
    if(sel){ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5;rrect(cx2,cy2,cellW,cellH,8);ctx.stroke();}
    ctx.save();const sc=0.44;ctx.scale(sc,sc);drawAvatar(avatarIdx,(cx2+cellW/2)/sc,(cy2+cellH/2-6)/sc,frame);ctx.restore();
    const rar=getAvatarRarity(avatarIdx);
    ctx.fillStyle=rar?RARITY_COLOR[rar]:(sel?'#FFD700':'#999');ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText(getAvatarName(avatarIdx),cx2+cellW/2,cy2+cellH-5);
  });
  // pagination arrows
  const arrowY=gridY+2*(cellH+6)+14;settingsPrevBtn=null;settingsNextBtn=null;
  if(settingsPage>0){settingsPrevBtn={x:px+20,y:arrowY,w:80,h:28};ctx.fillStyle='rgba(255,255,255,0.1)';rrect(px+20,arrowY,80,28,8);ctx.fill();ctx.fillStyle='#aaa';ctx.font='14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('◀ Prev',px+60,arrowY+14);ctx.textBaseline='alphabetic';}
  if(settingsPage<totalPages-1){settingsNextBtn={x:px+pw-100,y:arrowY,w:80,h:28};ctx.fillStyle='rgba(255,255,255,0.1)';rrect(px+pw-100,arrowY,80,28,8);ctx.fill();ctx.fillStyle='#aaa';ctx.font='14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Next ▶',px+pw-60,arrowY+14);ctx.textBaseline='alphabetic';}
  if(totalPages>1){ctx.fillStyle='#666';ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText(`${settingsPage+1}/${totalPages}`,W/2,arrowY+14);}

  // Action buttons
  const btnY0=arrowY+40,btnW=pw-56,btnH=42,btnX=px+28;
  settingsBtns={};
  [['resume','▶  Resume','#22CC66'],['restart','↺  Restart','#FF4455'],['pause','⏸  Pause Game','#4488FF']].forEach(([key,label,color],i)=>{
    const by=btnY0+i*(btnH+8);settingsBtns[key]={x:btnX,y:by,w:btnW,h:btnH};
    ctx.fillStyle=color+'28';rrect(btnX,by,btnW,btnH,10);ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=1.5;rrect(btnX,by,btnW,btnH,10);ctx.stroke();
    ctx.fillStyle=color;ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,btnX+btnW/2,by+btnH/2);ctx.textBaseline='alphabetic';
  });
}

  const bw=pw-40,bh=64,bx=px+20;storeBtns={buy:[]};
  [{key:'unicorn',icon:'🦄',label:'Unicorn Box',sub:'10 variants · 3 legendary',color:'#FF69B4'},
   {key:'furball',icon:'🐾',label:'Furball Box',sub:'10 variants · 2 legendary',color:'#FF8C00'},
   {key:'bunny',  icon:'🐰',label:'Bunny Box',  sub:'10 variants · 2 legendary',color:'#AADDFF'},
  ].forEach((box,i)=>{
    const by=py+108+i*(bh+12);storeBtns.buy.push({x:bx,y:by,w:bw,h:bh,key:box.key});
    const ok=diamonds>=5;ctx.fillStyle=ok?box.color+'1A':'rgba(40,40,40,0.5)';rrect(bx,by,bw,bh,12);ctx.fill();ctx.strokeStyle=ok?box.color:'#444';ctx.lineWidth=1.5;rrect(bx,by,bw,bh,12);ctx.stroke();
    ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=ok?box.color:'#666';ctx.font='bold 17px Arial';ctx.fillText(box.icon+'  '+box.label,bx+16,by+24);
    ctx.fillStyle=ok?'#aaa':'#555';ctx.font='11px Arial';ctx.fillText(box.sub,bx+16,by+44);
    ctx.textAlign='right';ctx.fillStyle=ok?'#FFD700':'#555';ctx.font='bold 16px Arial';ctx.fillText('5 💎',bx+bw-16,by+bh/2);
    ctx.textBaseline='alphabetic';
  });
  // close button
  const cy2=py+ph-54;storeBtns.close={x:bx,y:cy2,w:bw,h:42};
  ctx.fillStyle='rgba(255,255,255,0.07)';rrect(bx,cy2,bw,42,10);ctx.fill();ctx.strokeStyle='#555';ctx.lineWidth=1;rrect(bx,cy2,bw,42,10);ctx.stroke();
  ctx.fillStyle='#aaa';ctx.font='15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Close',W/2,cy2+21);ctx.textBaseline='alphabetic';
}

function drawStoreResult(){
  const W=canvas.width,H=canvas.height,r=storeResult;
  const pw=Math.min(380,W-32),ph=Math.min(430,H-40),px=(W-pw)/2,py=(H-ph)/2;
  const rc2=RARITY_COLOR[r.variant.rarity];
  ctx.fillStyle='#080820';rrect(px,py,pw,ph,18);ctx.fill();
  ctx.strokeStyle=rc2;ctx.lineWidth=2.5;rrect(px,py,pw,ph,18);ctx.stroke();
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='20px Arial';ctx.textBaseline='middle';ctx.fillText('You got...',W/2,py+36);
  // draw avatar
  drawAvatar(r.avatarIdx,W/2,py+175,frame);
  // rarity
  ctx.fillStyle=rc2;ctx.shadowColor=rc2;ctx.shadowBlur=12;ctx.font='bold 17px Arial';ctx.fillText(RARITY_LABEL[r.variant.rarity],W/2,py+268);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.fillText(r.variant.name,W/2,py+296);
  ctx.fillStyle=r.isNew?'#22CC66':'#FF8844';ctx.font='15px Arial';ctx.fillText(r.isNew?'✨  NEW!':'🔁  Already owned — +1 💎 refunded',W/2,py+320);
  // buttons
  storeResultBtns={};
  const bh=42,by2=py+ph-58,bw2=(pw-48)/2;
  if(r.isNew){storeResultBtns.equip={x:px+16,y:by2,w:bw2,h:bh};ctx.fillStyle='#22CC6630';rrect(px+16,by2,bw2,bh,10);ctx.fill();ctx.strokeStyle='#22CC66';ctx.lineWidth=1.5;rrect(px+16,by2,bw2,bh,10);ctx.stroke();ctx.fillStyle='#22CC66';ctx.font='bold 15px Arial';ctx.fillText('Equip',px+16+bw2/2,by2+bh/2);}
  const ox=r.isNew?px+16+bw2+16:px+(pw-bw2)/2;storeResultBtns.ok={x:ox,y:by2,w:bw2,h:bh};ctx.fillStyle='rgba(255,255,255,0.08)';rrect(ox,by2,bw2,bh,10);ctx.fill();ctx.strokeStyle='#888';ctx.lineWidth=1;rrect(ox,by2,bw2,bh,10);ctx.stroke();ctx.fillStyle='#aaa';ctx.font='bold 15px Arial';ctx.fillText('Continue',ox+bw2/2,by2+bh/2);
  ctx.textBaseline='alphabetic';
}

// ─── Paused ──────────────────────────────────────────────────
function drawPaused(){
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#4488FF';ctx.shadowColor='#4488FF';ctx.shadowBlur=22;ctx.font='bold 62px Arial Black,Arial';ctx.fillText('PAUSED',W/2,H/2-16);ctx.shadowBlur=0;
  const pulse=0.6+Math.sin(frame*0.07)*0.4;ctx.globalAlpha=pulse;ctx.fillStyle='#ccc';ctx.font='20px Arial';ctx.fillText('Tap to resume  •  ⚙ for settings',W/2,H/2+36);ctx.globalAlpha=1;ctx.restore();
}

// ─── Start ───────────────────────────────────────────────────
function drawStart(){
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const title='Rainbow Runner';ctx.font='bold 54px Arial Black,Arial';
  title.split('').forEach((ch,i)=>{const ci=i%RAINBOW_COLORS.length;ctx.fillStyle=RAINBOW_COLORS[ci];ctx.shadowColor=RAINBOW_COLORS[ci];ctx.shadowBlur=14;ctx.fillText(ch,W/2-(title.length/2-0.5-i)*32,H/2-90);});ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='20px Arial';ctx.fillText('Tap / Space to jump & catch stars!',W/2,H/2-24);
  ctx.fillStyle='#FFB347';ctx.font='16px Arial';ctx.fillText('Miss 5 in a row = game over',W/2,H/2+14);ctx.fillText('Every 20 stars = new level + 💎 diamond + avatar!',W/2,H/2+42);ctx.fillText('Spend 5 💎 at the 🏪 store for mystery avatars!',W/2,H/2+68);
  const pulse=0.7+Math.sin(frame*0.07)*0.3;ctx.globalAlpha=pulse;ctx.fillStyle='#fff';ctx.font='bold 28px Arial';ctx.fillText('✦  Tap to Start  ✦',W/2,H/2+112);ctx.globalAlpha=1;
  drawBrownUnicorn(W/2,H*0.83,frame);
  ctx.restore();
}

// ─── Level Up ────────────────────────────────────────────────
function drawLevelUp(){
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const txt='LEVEL  '+level+' !';ctx.font='bold 58px Arial Black,Arial';
  txt.split('').forEach((ch,i)=>{const ci=(i+Math.floor(frame*0.12))%RAINBOW_COLORS.length;const cx2=W/2-(txt.length/2-0.5-i)*34;ctx.fillStyle=RAINBOW_COLORS[ci];ctx.shadowColor=RAINBOW_COLORS[ci];ctx.shadowBlur=16;ctx.fillText(ch,cx2,H*0.26);});ctx.shadowBlur=0;
  ctx.fillStyle='#88DDFF';ctx.font='bold 20px Arial';ctx.fillText('💎 +1 diamond  (total: '+diamonds+')',W/2,H*0.35);
  if(newUnlock!==null){
    ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;ctx.font='bold 24px Arial';ctx.fillText('New Avatar Unlocked!',W/2,H*0.42);ctx.shadowBlur=0;
    drawAvatar(newUnlock,W/2,H*0.58,frame);
    ctx.fillStyle='#fff';ctx.font='20px Arial';ctx.fillText(getAvatarName(newUnlock),W/2,H*0.70);
    if(newUnlock===5){ctx.fillStyle='#FF69B4';ctx.font='bold 16px Arial';ctx.fillText('Wait... WHAT?!',W/2,H*0.75);}
  } else {
    ctx.fillStyle='#aaf';ctx.font='18px Arial';
    if(level>=7){ctx.fillStyle='#FF4444';ctx.shadowColor='#FF4400';ctx.shadowBlur=8;ctx.font='bold 22px Arial';ctx.fillText('🔥 THINGS ARE GETTING FAST 🔥',W/2,H*0.46);ctx.shadowBlur=0;}
    else{ctx.fillText('Speed increased! Keep running!',W/2,H*0.46);}
  }
  const pulse=0.65+Math.sin(frame*0.09)*0.35;ctx.globalAlpha=pulse;ctx.fillStyle='#fff';ctx.font='bold 22px Arial';ctx.fillText('Tap to continue',W/2,H*0.88);ctx.globalAlpha=1;ctx.restore();
}

// ─── Game Over ───────────────────────────────────────────────
function drawGameOver(){
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#FF4444';ctx.shadowColor='#FF0000';ctx.shadowBlur=24;ctx.font='bold 64px Arial Black,Arial';ctx.fillText('GAME OVER',W/2,H/2-70);
  ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=12;ctx.font='30px Arial';ctx.fillText('Stars: '+score+'   Level: '+level,W/2,H/2-10);
  ctx.fillStyle='#88DDFF';ctx.shadowColor='#88DDFF';ctx.shadowBlur=8;ctx.font='18px Arial';ctx.fillText('💎 '+diamonds+' diamonds saved',W/2,H/2+24);ctx.shadowBlur=0;
  ctx.fillStyle='#eee';ctx.font='14px Arial';const owned=[...unlockedAvatars,...Array.from(ownedMysteryAvatars)];ctx.fillText('Avatars owned: '+owned.length,W/2,H/2+50);
  const pulse=0.65+Math.sin(frame*0.09)*0.35;ctx.globalAlpha=pulse;ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.fillText('Tap / Space to try again',W/2,H/2+100);ctx.globalAlpha=1;ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const W=canvas.width,gy=groundLevel();
  drawBg();drawRainbow();
  // collectible stars
  stars.forEach(s=>{
    ctx.globalAlpha=s.missed?0.28:1;drawStar5(s.x,s.y,s.size,'#FFD700',!s.missed);ctx.globalAlpha=1;
    if(!s.missed){ctx.strokeStyle='rgba(255,215,0,0.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(s.x,s.y+s.size);ctx.lineTo(s.x,gy);ctx.stroke();ctx.setLineDash([]);}
  });
  // particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;drawStar5(p.x,p.y,p.r,p.color,false);});ctx.globalAlpha=1;
  // player
  drawAvatar(activeAvatar,player.x,player.y,player.legFrame);
  if(state!=='start')drawHUD();
  if(state==='start')   drawStart();
  if(state==='levelup') drawLevelUp();
  if(state==='gameover')drawGameOver();
  if(state==='paused')  drawPaused();
  if(state==='settings')drawSettings();
  if(state==='store')   drawStore();
  // persistent buttons
  drawMuteBtn();
  if(state!=='start'){drawSettingsBtn();drawStoreBtn();}
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update(){
  frame++;
  if(state!=='playing')return;
  scrollX+=speed;
  player.vy+=GRAVITY;player.y+=player.vy;player.legFrame++;
  const gy=groundLevel();
  if(player.y>=gy){player.y=gy;player.vy=0;player.jumping=false;}
  checkCatch();
  spawnTimer++;if(spawnTimer>=spawnCooldown){spawnStar();spawnTimer=0;}
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];s.x-=speed;s.phase++;
    if(!s.caught&&!s.missed&&s.x<player.x-55){s.missed=true;missesInRow++;if(missesInRow>=5){state='gameover';return;}}
    if(s.x<-80)stars.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.35;p.life-=0.028;if(p.life<=0)particles.splice(i,1);}
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(){update();render();requestAnimationFrame(loop);}
initGame();
loop();
</script>
